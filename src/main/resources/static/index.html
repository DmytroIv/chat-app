<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pupils Chat Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Security Gateway</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="password">
        <button onclick="login()">Authenticate & Connect</button>
        <p id="error-msg" style="color:red; text-align:center; display:none;">Invalid credentials</p>
    </div>

    <div id="chat-screen" class="container" style="display:none; width: 600px;">
        <h2>Global Chat Stream</h2>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="message-input" placeholder="Type a secure message...">
            <button onclick="sendMessage()" style="width: 100px;">Send</button>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
