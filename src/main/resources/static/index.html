<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pupils Chat Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>


    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="container">
        <h2>Security Gateway</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="password">
        <button onclick="login()">Authenticate</button>
        <p id="error-msg" class="error">Invalid credentials</p>
    </div>

    <!-- MAIN APP DASHBOARD -->
    <div id="app-screen" class="app-container" style="display:none;">
        
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>Pupils Channels</h3>
            <ul id="channel-list">
                <li class="active" onclick="switchRoom('general')"># general</li>
                <li onclick="switchRoom('engineering')"># engineering</li>
                <li onclick="switchRoom('random')"># random</li>
            </ul>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <h2 id="current-room-title"># general</h2>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Message channel...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>

    <script src="/script.js"></script>
</body>
</html>
